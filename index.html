<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無料翻訳アプリ</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
max-width:800px;
margin:auto;
}

.container{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

textarea{
width:100%;
height:150px;
padding:10px;
margin-bottom:10px;
}

button{
background:#0078d7;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#005fa3;
}

#result{
margin-top:20px;
padding:15px;
background:#f0f0f0;
border-radius:5px;
min-height:50px;
}

</style>

</head>

<body>

<div class="container">

<h1>無料翻訳アプリ</h1>

<textarea id="inputText"
placeholder="翻訳したい文章を入力"></textarea>

<br><br>

<button onclick="translateText()">
翻訳する
</button>

<div id="result">
翻訳結果が表示されます
</div>

</div>

<script>

async function translateText(){

const text =
document.getElementById("inputText").value;

if(!text){
alert("文章を入力してください");
return;
}

document.getElementById("result").innerHTML =
"翻訳中...";

try{

const response = await fetch(
"https://translate.argosopentech.com/translate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
q:text,
source:"ja",
target:"en",
format:"text"
})
});

const data = await response.json();

document.getElementById("result").innerHTML =
data.translatedText;

}
catch(error){

document.getElementById("result").innerHTML =
"翻訳エラー";

}

}

</script>

</body>
</html>
