<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タクシー音声翻訳アプリ</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f7fb;
  margin:0;
  padding:16px;
}
.app{
  max-width:760px;
  margin:auto;
}
h1{
  font-size:26px;
  text-align:center;
}
.card{
  background:white;
  padding:18px;
  border-radius:16px;
  margin-bottom:16px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}
button{
  width:100%;
  font-size:20px;
  padding:16px;
  border:none;
  border-radius:14px;
  margin:8px 0;
  cursor:pointer;
}
.listen{
  background:#0078d7;
  color:white;
}
.speak{
  background:#16a34a;
  color:white;
}
.phrase{
  background:#eef2ff;
  color:#111827;
}
.result{
  background:#f1f5f9;
  padding:14px;
  border-radius:12px;
  min-height:70px;
  font-size:20px;
  line-height:1.6;
}
.small{
  color:#666;
  font-size:14px;
}
select{
  width:100%;
  font-size:18px;
  padding:12px;
  border-radius:10px;
  margin:8px 0;
}
</style>
</head>

<body>
<div class="app">

<h1>🚕 タクシー音声翻訳</h1>

<div class="card">
  <h2>お客さんの声を聞く</h2>
  <p class="small">外国人のお客さんに話してもらい、日本語に変換します。</p>

  <select id="customerLang">
    <option value="en-US">英語</option>
    <option value="zh-CN">中国語</option>
    <option value="ko-KR">韓国語</option>
    <option value="vi-VN">ベトナム語</option>
    <option value="th-TH">タイ語</option>
    <option value="fr-FR">フランス語</option>
    <option value="es-ES">スペイン語</option>
  </select>

  <button class="listen" onclick="listenCustomer()">🎤 お客さんの声を聞く</button>

  <h3>聞き取った内容</h3>
  <div id="customerText" class="result">ここに聞き取った文章が表示されます</div>

  <h3>日本語訳</h3>
  <div id="customerResult" class="result">ここに日本語訳が表示されます</div>

  <button class="speak" onclick="speakCustomerResult()">🔊 日本語で読み上げ</button>
</div>

<div class="card">
  <h2>運転手が日本語で話す</h2>
  <p class="small">日本語で話して、お客さんの言語に変換します。</p>

  <button class="speak" onclick="listenDriver()">🎤 日本語で話す</button>

  <h3>聞き取った日本語</h3>
  <div id="driverText" class="result">ここに日本語が表示されます</div>

  <h3>翻訳結果</h3>
  <div id="driverResult" class="result">ここに翻訳結果が表示されます</div>

  <button class="speak" onclick="speakDriverResult()">🔊 お客さんの言語で読み上げ</button>
</div>

<div class="card">
  <h2>よく使うフレーズ</h2>

  <button class="phrase" onclick="setPhrase('行き先はどちらですか？')">行き先はどちらですか？</button>
  <button class="phrase" onclick="setPhrase('高速道路を使いますか？')">高速道路を使いますか？</button>
  <button class="phrase" onclick="setPhrase('現金ですか？カードですか？')">現金ですか？カードですか？</button>
  <button class="phrase" onclick="setPhrase('領収書は必要ですか？')">領収書は必要ですか？</button>
  <button class="phrase" onclick="setPhrase('ここで停まってよろしいですか？')">ここで停まってよろしいですか？</button>
  <button class="phrase" onclick="setPhrase('シートベルトをお願いします')">シートベルトをお願いします</button>
  <button class="phrase" onclick="setPhrase('少々お待ちください')">少々お待ちください</button>
</div>

</div>

<script>
const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

function getTargetLangCode(){
  const lang = document.getElementById("customerLang").value;
  if(lang.startsWith("en")) return "en";
  if(lang.startsWith("zh")) return "zh";
  if(lang.startsWith("ko")) return "ko";
  if(lang.startsWith("vi")) return "vi";
  if(lang.startsWith("th")) return "th";
  if(lang.startsWith("fr")) return "fr";
  if(lang.startsWith("es")) return "es";
  return "en";
}

function listenCustomer(){
  if(!SpeechRecognition){
    alert("このブラウザは音声認識に対応していません。Chromeで開いてください。");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = document.getElementById("customerLang").value;
  recognition.interimResults = false;

  document.getElementById("customerText").innerText = "聞き取り中...";
  document.getElementById("customerResult").innerText = "翻訳中...";

  recognition.start();

  recognition.onresult = async function(event){
    const text = event.results[0][0].transcript;
    document.getElementById("customerText").innerText = text;
    await translateText(text, getTargetLangCode(), "ja", "customerResult");
  };

  recognition.onerror = function(){
    document.getElementById("customerText").innerText = "音声認識エラー";
    document.getElementById("customerResult").innerText = "もう一度試してください";
  };
}

function listenDriver(){
  if(!SpeechRecognition){
    alert("このブラウザは音声認識に対応していません。Chromeで開いてください。");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "ja-JP";
  recognition.interimResults = false;

  document.getElementById("driverText").innerText = "聞き取り中...";
  document.getElementById("driverResult").innerText = "翻訳中...";

  recognition.start();

  recognition.onresult = async function(event){
    const text = event.results[0][0].transcript;
    document.getElementById("driverText").innerText = text;
    await translateText(text, "ja", getTargetLangCode(), "driverResult");
  };

  recognition.onerror = function(){
    document.getElementById("driverText").innerText = "音声認識エラー";
    document.getElementById("driverResult").innerText = "もう一度試してください";
  };
}

async function setPhrase(text){
  document.getElementById("driverText").innerText = text;
  document.getElementById("driverResult").innerText = "翻訳中...";
  await translateText(text, "ja", getTargetLangCode(), "driverResult");
}

async function translateText(text, source, target, resultId){
  try{
    const url =
      "https://api.mymemory.translated.net/get?q=" +
      encodeURIComponent(text) +
      "&langpair=" + source + "|" + target;

    const response = await fetch(url);
    const data = await response.json();

    document.getElementById(resultId).innerText =
      data.responseData.translatedText || "翻訳できませんでした";
  }
  catch(error){
    document.getElementById(resultId).innerText =
      "翻訳エラー。通信状況を確認してください。";
  }
}

function speakText(text, lang){
  if(!window.speechSynthesis){
    alert("この端末は音声読み上げに対応していません");
    return;
  }

  if(!text || text.includes("ここに") || text.includes("翻訳中")){
    alert("読み上げる翻訳結果がありません");
    return;
  }

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = lang;
  utterance.rate = 0.85;
  utterance.pitch = 1;

  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utterance);
}

function speakDriverResult(){
  const text = document.getElementById("driverResult").innerText;
  const lang = document.getElementById("customerLang").value;
  speakText(text, lang);
}

function speakCustomerResult(){
  const text = document.getElementById("customerResult").innerText;
  speakText(text, "ja-JP");
}
</script>

</body>
</html>
